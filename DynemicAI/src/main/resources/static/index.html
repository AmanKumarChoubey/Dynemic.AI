<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dynemic.AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/material-darker.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <span class="logo-icon">⬡</span>
            <span class="logo-text">Dynemic.AI</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            New Chat
        </button>
    </div>
    <div class="sidebar-section-label">Recent Chats</div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
        <div class="model-selector-wrap">
            <label class="model-label">Active Model</label>
            <div class="model-select-container">
                <div class="model-icon" id="modelIcon">✦</div>
                <select class="model-select" id="modelSelect">
                    <optgroup label="OpenAI">
                        <option value="openai:gpt-4o">GPT-4o</option>
                        <option value="openai:gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="openai:gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    </optgroup>
                    <optgroup label="Google Gemini">
                        <option value="gemini:gemini-2.0-flash">Gemini 2.0 Flash</option>
                        <option value="gemini:gemini-2.0-flash-lite">Gemini 2.0 Flash Lite</option>
                        <option value="gemini:gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="gemini:gemini-1.5-flash-8b">Gemini 1.5 Flash 8B</option>
                        <option value="gemini:gemma-3-27b-it">Gemma 3 27B</option>
                    </optgroup>
                    <optgroup label="Anthropic">
                        <option value="anthropic:claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                        <option value="anthropic:claude-3-opus-20240229">Claude 3 Opus</option>
                        <option value="anthropic:claude-3-haiku-20240307">Claude 3 Haiku</option>
                    </optgroup>
                </select>
            </div>
            <div class="model-badge" id="modelBadge">GPT-4o · OpenAI</div>
        </div>
    </div>
</aside>

<button class="sidebar-toggle" id="sidebarToggle">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
</button>

<main class="chat-main" id="chatMain">
    <header class="chat-header">
        <div class="chat-title-wrap">
            <span class="chat-title" id="chatHeaderTitle">New Conversation</span>
        </div>
        <div class="header-actions">
            <div class="current-model-pill" id="headerModelPill">
                <span class="pill-dot"></span>
                <span id="headerModelName">GPT-4o</span>
            </div>
            <button class="icon-btn" id="clearBtn" title="Clear chat">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
            </button>
        </div>
    </header>

    <div class="messages-wrap" id="messagesWrap">
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-glow"></div>
            <div class="welcome-icon">⬡</div>
            <h1 class="welcome-title">What can I help you with?</h1>
            <p class="welcome-sub">Switch models anytime from the sidebar.</p>
            <div class="suggestion-chips">
                <button class="chip" onclick="fillPrompt('Explain quantum computing in simple terms')">Explain quantum computing</button>
                <button class="chip" onclick="fillPrompt('Write a Python quicksort algorithm with explanation')">Python quicksort</button>
                <button class="chip" onclick="fillPrompt('What are the key differences between REST and GraphQL?')">REST vs GraphQL</button>
                <button class="chip" onclick="fillPrompt('Write a creative short story about a robot')">Creative story</button>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea class="chat-input" id="chatInput" placeholder="Message Dynemic.AI..." rows="1"></textarea>
            <div class="input-actions">
                <span class="char-count" id="charCount">0</span>
                <button class="send-btn" id="sendBtn" title="Send">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
        <div class="input-footer">
            <span>Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
        </div>
    </div>
</main>

<!--
    SCRIPT LOADING ORDER IS CRITICAL:
    1. highlight.js  — syntax highlighting library
    2. marked.js     — markdown parsing library
    3. api.js        — API/fetch layer (no dependencies on app.js)
    4. app.js        — app logic (depends on marked, hljs, and API from api.js)
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
