spring.application.name=DynemicAI
server.port=8081

#  AI Provider API Keys
# OpenAI
ai.openai.api-key=YOUR_OPENAI_API_KEY_HERE
ai.openai.base-url=https://api.openai.com/v1
ai.openai.default-model=gpt-4o

# Google Gemini
ai.gemini.api-key=AIzaSyA-J3e0ur7F1PKBWUt5xhUmWkHhKQsP-as
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
ai.gemini.default-model=gemma-3-27B-it

# Anthropic Claude
ai.anthropic.api-key=YOUR_ANTHROPIC_API_KEY_HERE
ai.anthropic.base-url=https://api.anthropic.com/v1
ai.anthropic.default-model=claude-3-5-sonnet-20241022
ai.anthropic.version=2023-06-01

# Chat Configuration
chat.max-tokens=2048
chat.temperature=0.7
chat.system-prompt=You are Dynemic.AI, a helpful AI assistant. Be concise, accurate, and friendly.

#  Database (H2 in-memory for dev)
spring.datasource.url=jdbc:h2:mem:DynemicAI;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CORS
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# Logging
logging.level.com.DynemicAI=DEBUG
logging.level.org.springframework.web=INFO
